name: Auto Publish Package

on:
  push:
    branches:
      - main
      - development
      - feature/**

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://npm.pkg.github.com

      - name: Setup npm registry
        run: |
          npm config set @LamNguyen17:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Set Version
        id: version
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          if [ "$BRANCH" = "main" ]; then
            npm version patch --no-git-tag-version
            TAG="latest"

          elif [ "$BRANCH" = "development" ]; then
            NEW_VERSION="${CURRENT_VERSION}-beta.${GITHUB_RUN_NUMBER}"
            npm version $NEW_VERSION --no-git-tag-version
            TAG="beta"

          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            NEW_VERSION="${CURRENT_VERSION}-alpha.${SHORT_SHA}"
            npm version $NEW_VERSION --no-git-tag-version
            TAG="alpha"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Set dist-tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npm dist-tag add @LamNguyen17/sp-features-friends@$VERSION ${{ steps.version.outputs.tag }} \
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
